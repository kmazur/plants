[server]
host = 127.0.0.1
port = 8090
auth_token =
# Remote admin shell at /admin. DISABLED by default. When true, anyone with the
# normal auth_token (same token / cookie) can run shell commands on the Pi via
# that page. Only enable behind the local bind/tunnel.
admin_enabled = false
admin_timeout = 60

[camera]
snapshot_width = 1920
snapshot_height = 1080
live_width = 1280
live_height = 720
live_fps = 5
hflip = true
vflip = true
tuning_file = /usr/share/libcamera/ipa/rpi/vc4/imx477_noir.json
warmup_seconds = 0.7
retry_count = 3
retry_delay_seconds = 3

[snapshot]
retain_days = 14
skip_when_camera_busy = true

[paths]
data_dir = /home/user/camera-remote-data
lock_file = /tmp/camera-remote-camera.lock
